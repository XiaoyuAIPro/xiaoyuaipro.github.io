name: 每日 AI 晚报自动生成

on:
  # 每天北京时间 18:30 自动触发（UTC 10:30）
  schedule:
    - cron: "30 10 * * *"
  # 支持手动触发，方便调试
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "强制重新生成（即使今日已存在）"
        required: false
        default: "false"
        type: boolean

jobs:
  generate:
    name: 生成并发布晚报
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许 Action 推送代码

    steps:
      - name: 检出代码（含子模块 PaperMod）
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: 安装 Python 依赖
        run: pip install -r scripts/requirements.txt

      - name: 检查今日晚报是否已存在
        id: check_exists
        run: |
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          FILE="content/posts/${TODAY}-daily-report.md"
          echo "today=${TODAY}" >> $GITHUB_OUTPUT
          if [ -f "$FILE" ] && [ "${{ github.event.inputs.force_regenerate }}" != "true" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⏭️  今日晚报已存在: $FILE"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📋 准备生成: $FILE"
          fi

      - name: 生成每日 AI 晚报
        if: steps.check_exists.outputs.exists == 'false'
        id: generate
        env:
          # 优先级: DEEPSEEK_API_KEY > ANTHROPIC_API_KEY > GEMINI_API_KEY > 纯 RSS
          # 在仓库 Settings → Secrets and variables → Actions 中配置对应的 Secret
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          # 可选：指定 DeepSeek 模型（默认 deepseek-chat）
          # DEEPSEEK_MODEL: deepseek-reasoner
        run: python scripts/daily_report.py

      - name: 提交并推送新晚报
        if: steps.check_exists.outputs.exists == 'false'
        run: |
          git config --local user.name  "AI晚报机器人"
          git config --local user.email "bot@xiaoyuaipro.github.io"
          git add content/posts/
          # 只在有新文件时才提交
          if ! git diff --cached --quiet; then
            TODAY="${{ steps.check_exists.outputs.today }}"
            git commit -m "🤖 自动发布：${TODAY} AI晚报"
            git push
            echo "✅ 新晚报已推送至 main 分支"
          else
            echo "⏭️  没有新内容，跳过提交"
          fi
