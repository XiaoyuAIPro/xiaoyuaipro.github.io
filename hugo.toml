baseURL = 'https://xiaoyuaipro.github.io/'
languageCode = 'zh-cn'
title = '小宇AI | 智启未来'
theme = "PaperMod"

# 分页：每页显示 10 篇
paginate = 10

[params]
    env = "production"
    title = "小宇AI"
    description = "探索 AI 的无限可能 | 每日 AI 晚报"
    author = "小宇"
    defaultTheme = "dark"         # 默认深色模式
    disableThemeToggle = false    # 允许用户手动切换

    # 文章功能
    ShowCodeCopyButtons = true
    ShowToc = true
    TocOpen = false
    ShowBreadCrumbs = true
    ShowReadingTime = true
    ShowShareButtons = true       # 显示分享按钮（微信/Twitter/Line 等）
    ShowPostNavLinks = true       # 文章底部显示上一篇/下一篇
    ShowWordCount = false

    # 封面图：在列表页和详情页都显示，且自适应屏幕
    [params.cover]
        hidden = false
        hiddenInList = false
        hiddenInSingle = false
        responsiveImages = true   # 自动生成多分辨率，移动端加载更快

    # 首页：个人门户模式
    [params.profileMode]
        enabled = true
        title = "小宇AI晚报"
        subtitle = "🤖 每天三分钟，同步全球 AI 最前沿资讯 | 智启未来，始于今日"
        imageUrl = "https://img.icons8.com/fluency/240/artificial-intelligence.png"
        imageWidth = 120
        imageHeight = 120
        imageTitle = "小宇AI"
        [[params.profileMode.buttons]]
            name = "📰 查看今日晚报"
            url = "/latest/"      # 直接跳转最新一篇
        [[params.profileMode.buttons]]
            name = "📚 历史归档"
            url = "/archives/"

    # 社交图标
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/xiaoyuaipro"
    [[params.socialIcons]]
        name = "twitter"
        url = "https://x.com/xiaoyuaipro"
    [[params.socialIcons]]
        name = "rss"
        url = "/index.xml"

# 导航栏
[[menu.main]]
    identifier = "posts"
    name = "晚报"
    url = "/posts/"
    weight = 10
[[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20
[[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 30
[[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 40

# 输出格式（搜索需要 JSON，RSS 订阅需要 RSS）
[outputs]
    home = ["HTML", "RSS", "JSON"]
