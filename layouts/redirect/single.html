<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>跳转中... | {{ site.Title }}</title>
  {{/* 按日期倒序取最新一篇 posts */}}
  {{ $latest := index ((where site.RegularPages "Section" "posts").ByDate.Reverse) 0 }}
  {{ if $latest }}
  <meta http-equiv="refresh" content="0; url={{ $latest.Permalink }}">
  <script>window.location.replace("{{ $latest.Permalink }}");</script>
  {{ end }}
  <style>
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #a78bfa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>正在跳转到最新晚报...</p>
  {{ $latest := index ((where site.RegularPages "Section" "posts").ByDate.Reverse) 0 }}
  {{ if $latest }}
  <p><a href="{{ $latest.Permalink }}">{{ $latest.Title }}</a></p>
  {{ end }}
</body>
</html>
